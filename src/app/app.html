@if (currentUser()) {
  <header class="app-header">
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid app-container">
        <a class="navbar-brand fw-bold" routerLink="/feed">Angular Blog</a>

        <div class="navbar-nav flex-row gap-2">
          <a class="nav-link" routerLink="/feed" routerLinkActive="active">Лента</a>
          <a class="nav-link" routerLink="/public" routerLinkActive="active">Публичные</a>
          <a class="nav-link" routerLink="/posts" routerLinkActive="active">Мои посты</a>
        </div>

        <div class="ms-auto d-flex align-items-center gap-2">
          <span class="user-pill">{{ currentUser()?.name }}</span>
          <a class="btn btn-outline-secondary btn-sm" routerLink="/auth" (click)="logout()">Выйти</a>
        </div>
      </div>
    </nav>
  </header>
}

<router-outlet />
